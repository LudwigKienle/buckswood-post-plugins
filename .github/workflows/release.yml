name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Resolve release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download llvm-mingw
        run: |
          mkdir -p third_party/toolchains
          curl -L \
            https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/llvm-mingw-20260616-ucrt-macos-universal.tar.xz \
            -o third_party/toolchains/llvm-mingw-20260616-ucrt-macos-universal.tar.xz
          tar -xf third_party/toolchains/llvm-mingw-20260616-ucrt-macos-universal.tar.xz -C third_party/toolchains

      - name: Build Windows package
        run: bash scripts/build_windows_release.sh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: buckswood-windows-release
          path: |
            windows_release/public/Buckswood_Resolve_Plugins_Setup.exe
            windows_release/public/Buckswood_Resolve_Plugins_Windows.zip
            windows_release/public/SHA256SUMS.txt

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: buckswood-windows-release
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/Buckswood_Resolve_Plugins_Setup.exe
            release-artifacts/Buckswood_Resolve_Plugins_Windows.zip
            release-artifacts/SHA256SUMS.txt
